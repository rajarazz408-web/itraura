<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Essence - ItrAura</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: #fff; }
        .detail-container {
            max-width: 1200px;
            margin: 120px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        .product-image-side img {
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 20px;
            background: #0a0a0a;
        }
        .product-info-side h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            color: #D4AF37;
            margin-bottom: 10px;
        }
        .category-tag {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            display: block;
        }
        .full-description {
            font-size: 17px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }
        .scent-profile {
            background: rgba(212, 175, 55, 0.05);
            padding: 20px;
            border-left: 3px solid #D4AF37;
            margin-bottom: 30px;
        }
        .scent-profile h4 { color: #D4AF37; margin-bottom: 10px; text-transform: uppercase; font-size: 13px; }
        .price-section { font-size: 32px; font-weight: 600; margin-bottom: 20px; }
        
        .ml-selector { display: flex; gap: 15px; margin-bottom: 30px; }
        .ml-box {
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .ml-box.active { border-color: #D4AF37; color: #D4AF37; background: rgba(212, 175, 55, 0.1); }

        .buy-now-btn {
            width: 100%;
            padding: 20px;
            background: #D4AF37;
            color: #000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .buy-now-btn:hover { background: #fff; }

        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; margin: 80px auto; text-align: center; }
            .ml-selector { justify-content: center; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">ItrAura</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </nav>
</header>

<div class="detail-container" id="product-detail">
    <!-- JS content yahan load karega -->
</div>

<script src="data.js"></script>
<script>
    // 1. URL se ID nikalna
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));

    // 2. Data.js mein se sahi product dhoondhna
    const item = products.find(p => p.id === productId);

    if (item) {
        const detailDiv = document.getElementById('product-detail');
        const availableSizes = Object.keys(item.prices);
        
        detailDiv.innerHTML = `
            <div class="product-image-side">
                <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="product-info-side">
                <span class="category-tag">${item.category}</span>
                <h1>${item.name}</h1>
                <div class="full-description">
                    ${item.fullDesc || item.desc}
                </div>
                
                <div class="scent-profile">
                    <h4>Scent Profile</h4>
                    <p><strong>Top:</strong> ${item.scentProfile?.top || 'Natural Essence'}</p>
                    <p><strong>Heart:</strong> ${item.scentProfile?.heart || 'Pure Floral'}</p>
                    <p><strong>Base:</strong> ${item.scentProfile?.base || 'Traditional Wood'}</p>
                </div>

                <div class="ml-selector">
                    ${availableSizes.map((size, index) => `
                        <div class="ml-box ${index === 0 ? 'active' : ''}" 
                             onclick="updateDetailPagePrice(this, ${item.prices[size]}, '${size}')">
                            ${size}
                        </div>
                    `).join('')}
                </div>

                <div class="price-section">₹<span id="detail-price">${item.prices[availableSizes[0]]}</span></div>
                
                <button class="buy-now-btn" onclick="sendWhatsApp()">Order via WhatsApp</button>
                <p style="font-size:12px; margin-top:15px; color:#666;">* Pure steam distilled. No alcohol. No synthetics.</p>
            </div>
        `;
    } else {
        document.getElementById('product-detail').innerHTML = "<h1>Product not found!</h1>";
    }

    let selectedSize = Object.keys(item.prices)[0];
    let selectedPrice = item.prices[selectedSize];

    function updateDetailPagePrice(el, price, size) {
        document.getElementById('detail-price').innerText = price;
        selectedPrice = price;
        selectedSize = size;
        document.querySelectorAll('.ml-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function sendWhatsApp() {
        const msg = `Hi, I want to order ${item.name} (${selectedSize}) for ₹${selectedPrice}. Please share payment details.`;
        window.open(`https://wa.me/917618243220?text=${encodeURIComponent(msg)}`);
    }
</script>

</body>
</html>
