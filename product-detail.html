<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Essence | ItrAura Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --dark-gray: #0a0a0a;
            --border: rgba(212, 175, 55, 0.2);
        }

        body { background: var(--black); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Navbar Simple Luxury */
        .navbar { padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }

        .detail-container {
            max-width: 1300px;
            margin: 80px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            align-items: start;
        }

        /* Image Side - No Cutting Fix */
        .product-image-side {
            background: #000;
            border: 1px solid var(--border);
            padding: 40px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 120px;
        }
        .product-image-side img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* CRITICAL: English-Hindi-Urdu text protection */
        }

        /* Info Side */
        .product-info-side h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(35px, 5vw, 55px);
            color: var(--gold);
            margin: 0 0 15px 0;
            font-style: italic;
        }
        .category-tag {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 10px;
            display: block;
        }
        .full-description {
            font-size: 16px;
            line-height: 1.8;
            color: #aaa;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* --- THE 4 POINTS PROMISE SECTION --- */
        .promise-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }
        .promise-item { display: flex; align-items: start; gap: 15px; }
        .promise-item i { color: var(--gold); font-size: 18px; margin-top: 4px; }
        .promise-item div h5 { color: var(--gold); margin: 0 0 5px 0; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .promise-item div p { color: #666; margin: 0; font-size: 11px; line-height: 1.4; }

        /* Scent Profile */
        .scent-profile {
            background: rgba(212, 175, 55, 0.03);
            padding: 30px;
            border-left: 2px solid var(--gold);
            margin-bottom: 40px;
        }
        .scent-profile h4 { color: var(--gold); margin: 0 0 15px 0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
        .scent-profile p { margin: 8px 0; font-size: 14px; color: #ccc; }

        /* Selectors & Buttons */
        .price-section { font-family: 'Playfair Display', serif; font-size: 40px; color: var(--gold); margin-bottom: 25px; }
        .ml-selector { display: flex; gap: 12px; margin-bottom: 30px; }
        .ml-box {
            border: 1px solid #333;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .ml-box.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .buy-now-btn {
            width: 100%;
            padding: 22px;
            background: var(--gold);
            color: #000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
        }
        .buy-now-btn:hover { background: #fff; transform: translateY(-3px); }

        @media (max-width: 900px) {
            .detail-container { grid-template-columns: 1fr; margin: 40px auto; }
            .product-image-side { position: relative; top: 0; height: 400px; }
            .promise-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">ItrAura</div>
    <nav>
        <a href="index.html" style="color: #888; text-decoration: none; margin-right: 20px;">Home</a>
        <a href="product.html" style="color: var(--gold); text-decoration: none;">Collections</a>
    </nav>
</header>

<div class="detail-container" id="product-detail">
    </div>

<script src="data.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const item = products.find(p => p.id === productId);

    if (item) {
        const detailDiv = document.getElementById('product-detail');
        const availableSizes = Object.keys(item.prices);
        
        detailDiv.innerHTML = `
            <div class="product-image-side">
                <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="product-info-side">
                <span class="category-tag">${item.category}</span>
                <h1>${item.name}</h1>
                <div class="full-description">
                    ${item.fullDesc || item.desc}
                </div>

                <div class="promise-grid">
                    <div class="promise-item">
                        <i class="fas fa-history"></i>
                        <div><h5>Est. 1958</h5><p>Legacy of family perfume mastery.</p></div>
                    </div>
                    <div class="promise-item">
                        <i class="fas fa-seedling"></i>
                        <div><h5>Hasayan Soul</h5><p>Direct from Indian Rose Capital.</p></div>
                    </div>
                    <div class="promise-item">
                        <i class="fas fa-fire-alt"></i>
                        <div><h5>Deg-Bhapka</h5><p>Ancient steam distillation art.</p></div>
                    </div>
                    <div class="promise-item">
                        <i class="fas fa-leaf"></i>
                        <div><h5>Pure Nature</h5><p>0% Alcohol. 100% Botanical.</p></div>
                    </div>
                </div>
                
                <div class="scent-profile">
                    <h4>Scent Profile</h4>
                    <p><strong>Top:</strong> ${item.scentProfile?.top || 'Natural Essence'}</p>
                    <p><strong>Heart:</strong> ${item.scentProfile?.heart || 'Pure Floral'}</p>
                    <p><strong>Base:</strong> ${item.scentProfile?.base || 'Traditional Wood'}</p>
                </div>

                <div class="ml-selector">
                    ${availableSizes.map((size, index) => `
                        <div class="ml-box ${index === 0 ? 'active' : ''}" 
                             onclick="updateDetailPagePrice(this, ${item.prices[size]}, '${size}')">
                            ${size}
                        </div>
                    `).join('')}
                </div>

                <div class="price-section">₹<span id="detail-price">${item.prices[availableSizes[0]]}</span></div>
                
                <button class="buy-now-btn" onclick="sendWhatsApp()">Reserve via WhatsApp</button>
            </div>
        `;
    }

    let selectedSize = Object.keys(item.prices)[0];
    let selectedPrice = item.prices[selectedSize];

    function updateDetailPagePrice(el, price, size) {
        document.getElementById('detail-price').innerText = price;
        selectedPrice = price;
        selectedSize = size;
        document.querySelectorAll('.ml-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function sendWhatsApp() {
        const msg = `Hi ItrAura, I'm interested in ${item.name} (${selectedSize}) priced at ₹${selectedPrice}. Please guide me with the purchase.`;
        window.open(`https://wa.me/917618243220?text=${encodeURIComponent(msg)}`);
    }
</script>

</body>
</html>
