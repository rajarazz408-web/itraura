<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Essence | ItrAura Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37; --black: #050505; --dark-gray: #0a0a0a;
            --border: rgba(212, 175, 55, 0.2); --transition: all 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        body { background: var(--black); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; cursor: pointer; }
        
        .nav-right { display: flex; align-items: center; gap: 25px; }
        .cart-trigger { position: relative; cursor: pointer; color: var(--gold); font-size: 20px; }
        .cart-count { position: absolute; top: -10px; right: -12px; background: #fff; color: #000; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* LUXURY SIDE CART */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #080808; border-left: 1px solid var(--gold); z-index: 9999; transition: var(--transition); padding: 40px; display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.9); }
        #cart-drawer.open { right: 0; }
        .cart-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 30px; }
        .cart-head h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; }
        #cart-content { flex-grow: 1; overflow-y: auto; }
        .cart-item-row { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; border-bottom: 1px solid #111; padding-bottom: 15px; }
        .cart-item-row img { width: 70px; height: 70px; object-fit: contain; border: 1px solid #222; background: #000; }
        .cart-total { display: flex; justify-content: space-between; font-size: 22px; color: var(--gold); font-family: 'Playfair Display', serif; padding: 20px 0; border-top: 1px solid #222; margin-top: 20px; }
        .checkout-btn { width: 100%; padding: 20px; background: var(--gold); color: #000; font-weight: 700; text-transform: uppercase; border: none; letter-spacing: 2px; cursor: pointer; }
        #cart-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9998; display: none; backdrop-filter: blur(5px); }

        /* Detail Layout */
        .detail-container { max-width: 1300px; margin: 60px auto; padding: 20px; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 60px; align-items: start; }
        .product-image-side { background: #000; border: 1px solid var(--border); padding: 40px; height: 600px; display: flex; align-items: center; justify-content: center; position: sticky; top: 120px; }
        .product-image-side img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .product-info-side h1 { font-family: 'Playfair Display', serif; font-size: clamp(35px, 5vw, 55px); color: var(--gold); margin: 0 0 15px 0; font-style: italic; }
        .category-tag { text-transform: uppercase; letter-spacing: 5px; font-size: 11px; color: var(--gold); margin-bottom: 10px; display: block; }
        .full-description { font-size: 16px; line-height: 1.8; color: #aaa; margin-bottom: 40px; font-weight: 300; }

        .promise-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        .promise-item { display: flex; align-items: start; gap: 12px; }
        .promise-item i { color: var(--gold); font-size: 16px; margin-top: 4px; }
        .promise-item h5 { color: var(--gold); margin: 0 0 4px 0; font-size: 12px; text-transform: uppercase; }
        .promise-item p { color: #666; margin: 0; font-size: 11px; }

        .scent-profile { background: rgba(212, 175, 55, 0.03); padding: 30px; border-left: 2px solid var(--gold); margin-bottom: 40px; }
        .scent-profile h4 { color: var(--gold); margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

        .price-section { font-family: 'Playfair Display', serif; font-size: 40px; color: var(--gold); margin-bottom: 25px; }
        .ml-selector { display: flex; gap: 12px; margin-bottom: 30px; }
        .ml-box { border: 1px solid #333; padding: 12px 25px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .ml-box.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .buy-now-btn { width: 100%; padding: 22px; background: var(--gold); color: #000; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }
        .buy-now-btn:hover { background: #fff; transform: translateY(-3px); }

        @media (max-width: 900px) {
            .detail-container { grid-template-columns: 1fr; margin: 20px auto; }
            .product-image-side { position: relative; top: 0; height: 400px; padding: 20px; }
            #cart-drawer { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<div id="cart-drawer">
    <div class="cart-head">
        <h2>Your Selection</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; color:var(--gold); font-size: 22px;"></i>
    </div>
    <div id="cart-content"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>Total</span>
            <span>₹<span id="cart-total-val">0</span></span>
        </div>
        <button class="checkout-btn" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
    </div>
</div>
<div id="cart-mask" onclick="toggleCart()"></div>

<header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">ItrAura</div>
    <div class="nav-right">
        <a href="product.html" style="color: #888; text-decoration: none; margin-right: 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Collections</a>
        <div class="cart-trigger" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cart-badge">0</span>
        </div>
    </div>
</header>

<div class="detail-container" id="product-detail">
    </div>

<script src="data.js"></script>
<script>
    let cart = JSON.parse(localStorage.getItem('itraura_cart')) || [];
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const item = products.find(p => p.id === productId);

    let selectedSize, selectedPrice;

    if (item) {
        const detailDiv = document.getElementById('product-detail');
        const availableSizes = Object.keys(item.prices);
        selectedSize = availableSizes[0];
        selectedPrice = item.prices[selectedSize];
        
        detailDiv.innerHTML = `
            <div class="product-image-side">
                <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="product-info-side">
                <span class="category-tag">${item.category}</span>
                <h1>${item.name}</h1>
                <div class="full-description">${item.fullDesc || item.desc}</div>

                <div class="promise-grid">
                    <div class="promise-item"><i class="fas fa-history"></i><div><h5>Est. 1958</h5><p>Legacy of purity.</p></div></div>
                    <div class="promise-item"><i class="fas fa-seedling"></i><div><h5>Hasayan Soul</h5><p>Direct from origin.</p></div></div>
                    <div class="promise-item"><i class="fas fa-fire-alt"></i><div><h5>Deg-Bhapka</h5><p>Ancient steam art.</p></div></div>
                    <div class="promise-item"><i class="fas fa-leaf"></i><div><h5>Pure Nature</h5><p>0% Alcohol.</p></div></div>
                </div>
                
                <div class="scent-profile">
                    <h4>Scent Profile</h4>
                    <p><strong>Top:</strong> ${item.scentProfile?.top || 'Natural'}</p>
                    <p><strong>Heart:</strong> ${item.scentProfile?.heart || 'Floral'}</p>
                    <p><strong>Base:</strong> ${item.scentProfile?.base || 'Woody'}</p>
                </div>

                <div class="ml-selector">
                    ${availableSizes.map((size, index) => `
                        <div class="ml-box ${index === 0 ? 'active' : ''}" 
                             onclick="updateDetailPagePrice(this, ${item.prices[size]}, '${size}')">
                            ${size}
                        </div>
                    `).join('')}
                </div>

                <div class="price-section">₹<span id="detail-price">${selectedPrice}</span></div>
                
                <button class="buy-now-btn" onclick="addToSelection()">Add to Selection</button>
                <p style="text-align:center; font-size:11px; color:#444; margin-top:15px; letter-spacing:1px;">HAND-DISTILLED • ALCOHOL FREE • BOTANICAL</p>
            </div>
        `;
    }

    function updateDetailPagePrice(el, price, size) {
        document.getElementById('detail-price').innerText = price;
        selectedPrice = price;
        selectedSize = size;
        document.querySelectorAll('.ml-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function addToSelection() {
        const existing = cart.find(c => c.id === item.id && c.size === selectedSize);
        if(existing) existing.qty++;
        else cart.push({ id: item.id, name: item.name, price: selectedPrice, size: selectedSize, img: item.img, qty: 1 });
        
        localStorage.setItem('itraura_cart', JSON.stringify(cart));
        updateBadge();
        toggleCart();
    }

    function toggleCart() {
        const drawer = document.getElementById('cart-drawer');
        const mask = document.getElementById('cart-mask');
        drawer.classList.toggle('open');
        mask.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-content');
        const totalVal = document.getElementById('cart-total-val');
        container.innerHTML = '';
        let total = 0;
        
        if(cart.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:50px; color:#444;">Your selection is empty.</p>';
            totalVal.innerText = '0'; return;
        }

        cart.forEach((c, index) => {
            total += c.price * c.qty;
            container.innerHTML += `
                <div class="cart-item-row">
                    <img src="${c.img}">
                    <div style="flex-grow:1">
                        <h4 style="color:var(--gold); font-size:14px; margin:0;">${c.name}</h4>
                        <p style="font-size:10px; color:#555; margin:5px 0;">${c.size} x ${c.qty}</p>
                        <p style="margin:0;">₹${c.price * c.qty}</p>
                    </div>
                    <i class="fas fa-trash" onclick="removeItem(${index})" style="cursor:pointer; color:#222; font-size:12px;"></i>
                </div>`;
        });
        totalVal.innerText = total;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('itraura_cart', JSON.stringify(cart));
        renderCart(); updateBadge();
    }

    function updateBadge() {
        document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.qty, 0);
    }

    function checkoutWhatsApp() {
        if(cart.length === 0) return;
        let msg = "Hello ItrAura, I'd like to order:\n";
        cart.forEach(i => msg += `• ${i.name} (${i.size}) x ${i.qty} = ₹${i.price*i.qty}\n`);
        msg += `\nTotal: ₹${document.getElementById('cart-total-val').innerText}\nPlease confirm.`;
        window.open(`https://wa.me/917618243220?text=${encodeURIComponent(msg)}`);
    }

    window.onload = updateBadge;
</script>

</body>
</html>
