<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Collections - ItrAura</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ML Selector Styles */
        .size-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .ml-btn {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 5px 12px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .ml-btn.active {
            background: #D4AF37;
            color: #000;
            font-weight: 600;
        }
        .product-card {
            cursor: pointer;
            transition: transform 0.4s ease;
        }
        .product-card:hover {
            transform: translateY(-10px);
        }
        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: 0.3s;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">ItrAura</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" class="active">Products</a>
    </nav>
</header>

<section class="shop-header">
    <h1>Our Premium Collection</h1>
    <p>Traditional copper deg distillation. 100% Purity. 0% Alcohol.</p>
</section>

<div class="container">
    <div id="product-list" class="product-grid">
        </div>
</div>

<a href="https://wa.me/917618243220" class="whatsapp-float" target="_blank">
    Chat on WhatsApp
</a>

<script src="data.js"></script>
<script>
    const productGrid = document.getElementById('product-list');

    function renderProducts() {
        if (typeof products !== 'undefined') {
            productGrid.innerHTML = ''; 
            
            products.forEach(item => {
                // Pehla size aur price nikalna
                const availableSizes = Object.keys(item.prices);
                const firstSize = availableSizes[0];
                const firstPrice = item.prices[firstSize];

                const card = document.createElement('div');
                card.className = 'product-card';
                
                card.innerHTML = `
                    <div class="badge">${item.category}</div>
                    <img src="${item.img}" alt="${item.name}" onclick="goToDetail(${item.id})" onerror="this.src='https://via.placeholder.com/300?text=ItrAura'">
                    <div class="info">
                        <h3 onclick="goToDetail(${item.id})">${item.name}</h3>
                        <p>${item.desc}</p>
                        
                        <div class="size-selector">
                            ${availableSizes.map((size, index) => `
                                <button class="ml-btn ${index === 0 ? 'active' : ''}" 
                                        onclick="changePrice(this, ${item.prices[size]})">
                                    ${size}
                                </button>
                            `).join('')}
                        </div>

                        <div class="price-tag">₹<span class="price-val">${firstPrice}</span></div>
                        <button class="btn" onclick="goToDetail(${item.id})">Experience Essence</button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }
    }

    // Function: Price update karne ke liye jab button click ho
    function changePrice(btn, newPrice) {
        const priceElement = btn.closest('.info').querySelector('.price-val');
        priceElement.innerText = newPrice;
        
        // Active button change karna
        const buttons = btn.parentElement.querySelectorAll('.ml-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Function: Next page (Detail Page) par bhejne ke liye
    function goToDetail(productId) {
        window.location.href = `product-detail.html?id=${productId}`;
    }

    renderProducts();
</script>

</body>
</html>
