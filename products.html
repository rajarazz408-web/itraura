<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products - ItrAura</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: 0.3s;
        }
        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">ItrAura</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" class="active">Products</a>
    </nav>
</header>

<section class="shop-header">
    <h1>Our Premium Collection</h1>
    <p>Handpicked natural fragrances and pure essential oils.</p>
</section>

<div class="container">
    <div id="product-list" class="product-grid">
        <!-- JavaScript yahan products load karega -->
    </div>
</div>

<a href="https://wa.me/917618243220" class="whatsapp-float" target="_blank">
    Chat on WhatsApp
</a>

<!-- Sequence: Pehle data.js phir products loading script -->
<script src="data.js"></script>
<script>
    const productGrid = document.getElementById('product-list');

    function renderProducts() {
        if (typeof products !== 'undefined') {
            productGrid.innerHTML = ''; 
            
            products.forEach(item => {
                // FIXED LINE: Ab ye seedha data.js se image name uthayega
                const imgFileName = item.img; 
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="badge">${item.category}</div>
                    <img src="${imgFileName}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300?text=ItrAura'">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <div class="price-tag">₹${item.price}</div>
                        <button class="btn" onclick="window.open('https://wa.me/917618243220?text=Hi, I want to buy ${item.name}')">Buy Now</button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        } else {
            console.error("Bhai, data.js file load nahi ho rahi hai!");
        }
    }

    renderProducts();
</script>

</body>
</html>
