<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItrAura | Artisanal Global Perfumery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0,0,0,0.95);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            margin-left: 25px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background-image: linear-gradient(to right, rgba(0,0,0,0.85) 20%, transparent 100%), url('Background.png');
            background-size: cover;
            background-position: center right; /* Desktop Fix */
            background-repeat: no-repeat;
        }

        .hero-content { max-width: 600px; z-index: 10; }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(38px, 7vw, 85px); /* Responsive Font */
            color: var(--gold);
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .hero-content .tagline {
            font-size: clamp(12px, 2vw, 16px);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #ccc;
        }

        .main-btn {
            padding: 15px 35px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .main-btn:hover { background: var(--gold); color: black; }

        /* --- Series Section (Fixing the Cut-off Issue) --- */
        .section-header { padding: 80px 8% 40px; text-align: center; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 8% 80px;
        }

        .cat-box {
            position: relative;
            height: 550px; /* Increased Height to show full content */
            overflow: hidden;
            border: 1px solid #222;
        }

        .cat-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image covers box without distorting */
            transition: 0.8s;
        }

        .cat-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
            padding: 40px 25px; /* Extra padding so text is not at the very edge */
            text-align: left;
        }

        .cat-overlay h3 { color: var(--gold); font-size: 26px; font-family: 'Playfair Display', serif; margin-top: 5px; }
        .cat-overlay p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #bbb; }

        /* --- Footer --- */
        footer { padding: 60px 8%; background: #050505; border-top: 1px solid #222; text-align: center; }
        footer p { font-size: 12px; color: #555; letter-spacing: 1px; }

        /* --- MOBILE FIXES --- */
        @media (max-width: 768px) {
            nav { padding: 15px 5%; }
            .nav-links { display: none; }
            .hero {
                justify-content: center;
                text-align: center;
                padding: 0 5%;
                background-position: center center; /* Centering bottle on mobile */
                background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.8)), url('Background.png');
            }
            .hero-content h1 { font-size: 42px; }
            .category-grid { grid-template-columns: 1fr; padding: 0 5% 50px; }
            .cat-box { height: 480px; } /* Slightly shorter for mobile but still safe */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ITRAURA</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Collections</a>
            <a href="https://wa.me/917618243220">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>ITRAURA</h1>
            <p class="tagline">The Essence in Every Drop</p>
            <a href="products.html" class="main-btn">Explore Now</a>
        </div>
    </header>

    <div class="section-header">
        <h2>The Signature Collections</h2>
    </div>

    <section class="category-grid">
        <div class="cat-box">
            <img src="ruh series.png" alt="Ruh Series">
            <div class="cat-overlay">
                <p>Distilled Purity</p>
                <h3>The Ruh Series</h3>
            </div>
        </div>
        <div class="cat-box">
            <img src="water series.png" alt="Water Series">
            <div class="cat-overlay">
                <p>Natural Hydrosols</p>
                <h3>Water Series</h3>
            </div>
        </div>
        <div class="cat-box">
            <img src="premium series.png" alt="Premium Series">
            <div class="cat-overlay">
                <p>Exquisite Blends</p>
                <h3>Premium Series</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 ITRAURA ARTISANAL PERFUMERY | GLOBAL DELIVERY</p>
    </footer>

</body>
</html>
