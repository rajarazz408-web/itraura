<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ItrAura | Essence in Every Drop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
--gold:#D4AF37;
--black:#000;
--glass:rgba(255,255,255,0.05);
}

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* ================= NAV ================= */
nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,215,0,0.2);
z-index:999;
}

.logo{
font-family:'Playfair Display',serif;
font-size:28px;
letter-spacing:5px;
color:var(--gold);
}

.nav-links{
display:flex;
list-style:none;
}

.nav-links a{
margin-left:30px;
text-decoration:none;
color:white;
letter-spacing:2px;
font-size:12px;
transition:0.3s;
}

.nav-links a:hover{
color:var(--gold);
text-shadow:0 0 10px var(--gold);
}

/* ================= HERO ================= */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
url('Background.png') center center/cover no-repeat;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:90px;
color:var(--gold);
letter-spacing:6px;
animation:fadeUp 1s ease;
}

.hero p{
letter-spacing:6px;
margin:20px 0;
}

.btn{
padding:15px 40px;
border:1px solid var(--gold);
color:var(--gold);
text-decoration:none;
transition:0.4s;
}

.btn:hover{
background:var(--gold);
color:black;
box-shadow:0 0 30px var(--gold);
}

/* ================= COLLECTION ================= */
.title{
text-align:center;
margin:120px 0 60px;
font-size:40px;
font-family:'Playfair Display',serif;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
padding:0 8%;
}

.card{
height:520px;
overflow:hidden;
position:relative;
cursor:pointer;
border:1px solid rgba(255,255,255,0.05);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:1.2s;
}

.card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:30px;
background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.overlay h3{
color:var(--gold);
font-family:'Playfair Display',serif;
}

/* ================= FEATURES ================= */
.features{
display:grid;
grid-template-columns:repeat(4,1fr);
padding:80px 8%;
gap:20px;
}

.feature{
text-align:center;
padding:40px;
border:1px solid rgba(255,215,0,0.1);
transition:0.4s;
}

.feature:hover{
border-color:var(--gold);
background:rgba(255,215,0,0.05);
}

/* ================= FOOTER ================= */
footer{
padding:80px 8%;
background:#050505;
text-align:center;
border-top:1px solid #111;
}

/* ================= WHATSAPP ================= */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px 20px;
border-radius:50px;
color:white;
text-decoration:none;
z-index:999;
}

/* ================= ANIMATION ================= */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* ================= MOBILE ================= */
@media(max-width:768px){

.hero h1{font-size:40px}

.grid{grid-template-columns:1fr}

.features{grid-template-columns:1fr}

}

</style>
</head>

<body>

<nav>
<div class="logo">ITRAURA</div>
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="https://wa.me/917618243220">Contact</a></li>
</ul>
</nav>

<section class="hero">
<div>
<h1>ITRAURA</h1>
<p>ESSENCE IN EVERY DROP</p>
<a href="products.html" class="btn">Explore Collection</a>
</div>
</section>

<h2 class="title">Our Collections</h2>

<div class="grid">

<div class="card" onclick="location.href='products.html'">
<img src="ruh series.png">
<div class="overlay">
<h3>Ruh Series</h3>
</div>
</div>

<div class="card" onclick="location.href='products.html'">
<img src="water series.png">
<div class="overlay">
<h3>Water Series</h3>
</div>
</div>

<div class="card" onclick="location.href='products.html'">
<img src="premium series.png">
<div class="overlay">
<h3>Premium Series</h3>
</div>
</div>

</div>

<div class="features">
<div class="feature">100% Natural</div>
<div class="feature">Long Lasting</div>
<div class="feature">Luxury Quality</div>
<div class="feature">Worldwide Shipping</div>
</div>

<footer>
<p>© 2026 ItrAura Luxury Attars</p>
</footer>

<a href="https://wa.me/917618243220" class="whatsapp">Chat</a>

</body>
</html>
